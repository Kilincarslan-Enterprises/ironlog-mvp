name: Deploy to Cloudflare Pages

# Deploys IronLog to Cloudflare Pages AND keeps the remote D1 schema + Clerk
# runtime env bindings in sync, entirely from GitHub Actions secrets — no
# manual Cloudflare dashboard steps required.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN        — CF API token w/ Pages + D1 + Account perms
#   CLOUDFLARE_ACCOUNT_ID       — CF account ID
#   CLERK_SECRET_KEY            — Clerk secret key (sk_*), pushed as Pages secret
#   CLERK_PUBLISHABLE_KEY       — Clerk prod publishable key (pk_live_*),
#                                 pushed as Pages secret AND used at build time
#   VITE_CLERK_PUBLISHABLE_KEY  — same pk_live_*, read by Vite at build time
#
# See docs/secrets.md for how to create each value.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Auth for every `npx wrangler` step below (wrangler reads these env vars).
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Clerk runtime + build keys (secret values, not echoed).
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLERK_SECRET_KEY \
                      CLERK_PUBLISHABLE_KEY VITE_CLERK_PUBLISHABLE_KEY; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Missing required GitHub secret: $name. See docs/secrets.md."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required GitHub Actions secrets are not set. Add them under repo Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Build
        run: npm run build
        env:
          # Vite reads VITE_* env vars at build time. The secret Clerk keys are
          # NOT baked into the build — they're pushed as Pages runtime secrets below.
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply ironlog-mvp-db --remote

      - name: Push Clerk runtime secrets to Pages
        # Pages Functions read CLERK_SECRET_KEY / CLERK_PUBLISHABLE_KEY from the
        # project's encrypted env bindings at runtime. `pages secret put` writes
        # them; pipe the value via stdin (non-interactive).
        run: |
          printf '%s' "$CLERK_SECRET_KEY"      | npx wrangler pages secret put CLERK_SECRET_KEY      --project-name=ironlog
          printf '%s' "$CLERK_PUBLISHABLE_KEY" | npx wrangler pages secret put CLERK_PUBLISHABLE_KEY --project-name=ironlog

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=ironlog